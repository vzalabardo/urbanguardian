<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#121212">
  <title>Urban Guardian — Crear cuenta</title>
  <link rel="stylesheet" href="../css/app.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .auth-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: var(--space-xl) var(--space-lg);
      padding-bottom: calc(var(--space-xl) + env(safe-area-inset-bottom, 0));
      gap: var(--space-lg);
    }

    .auth-header { display: flex; flex-direction: column; gap: var(--space-sm); }

    .auth-logo {
      width: 48px;
      height: 48px;
      background: var(--primary);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.375rem;
      color: #fff;
      margin-bottom: var(--space-md);
    }

    .auth-form { display: flex; flex-direction: column; gap: 0; }

    .auth-footer {
      margin-top: auto;
      text-align: center;
      font-size: 0.9375rem;
      color: var(--text-muted);
    }

    .error-banner {
      background: var(--danger-lt);
      border: 1px solid var(--danger);
      border-radius: var(--radius-md);
      padding: var(--space-md);
      font-size: 0.9rem;
      color: var(--danger);
      display: none;
      gap: var(--space-sm);
      align-items: flex-start;
    }

    .error-banner.visible { display: flex; }

    .strength-bar {
      height: 4px;
      border-radius: var(--radius-full);
      background: var(--bg-input);
      overflow: hidden;
      margin-top: var(--space-xs);
    }

    .strength-fill {
      height: 100%;
      border-radius: var(--radius-full);
      transition: width var(--transition), background var(--transition);
      width: 0%;
    }
  </style>
</head>
<body>
<div class="mobile-frame">
  <div class="auth-screen">

    <div class="auth-header">
      <div class="auth-logo">
        <i class="fa-solid fa-shield-halved"></i>
      </div>
      <h2>Crear cuenta</h2>
      <p class="text-muted">Únete a la red Urban Guardian</p>
    </div>

    <div class="error-banner" id="error-banner">
      <i class="fa-solid fa-circle-exclamation"></i>
      <span id="error-text"></span>
    </div>

    <form class="auth-form" id="register-form" novalidate>

      <div class="form-group">
        <label class="form-label" for="name">Nombre</label>
        <input
          class="form-input"
          type="text"
          id="name"
          name="name"
          placeholder="Tu nombre"
          autocomplete="name"
          required
        >
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input
          class="form-input"
          type="email"
          id="email"
          name="email"
          placeholder="tucorreo@ejemplo.com"
          autocomplete="email"
          required
        >
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Contraseña</label>
        <div class="input-wrapper">
          <input
            class="form-input"
            type="password"
            id="password"
            name="password"
            placeholder="Mínimo 8 caracteres"
            autocomplete="new-password"
            required
            minlength="8"
          >
          <button type="button" class="input-icon" id="toggle-pw" aria-label="Ver contraseña">
            <i class="fa-solid fa-eye" id="pw-icon"></i>
          </button>
        </div>
        <div class="strength-bar">
          <div class="strength-fill" id="strength-fill"></div>
        </div>
        <span class="form-hint" id="strength-label"></span>
      </div>

      <div class="form-group">
        <label class="form-label" for="password2">Confirmar contraseña</label>
        <input
          class="form-input"
          type="password"
          id="password2"
          name="password2"
          placeholder="Repite la contraseña"
          autocomplete="new-password"
          required
        >
      </div>

      <button type="submit" class="btn btn-primary btn-full btn-lg mt-md" id="btn-register">
        Crear cuenta
      </button>

    </form>

    <div class="auth-footer">
      ¿Ya tienes cuenta?
      <a href="login.html" style="font-weight:600;">Iniciar sesión</a>
    </div>

  </div>
</div>

<script type="module">
  import { registerWithEmail, watchAuthState } from '../js/auth.js';

  watchAuthState((user) => {
    if (user) window.location.href = 'setup-profile.html';
  });

  document.getElementById('toggle-pw').addEventListener('click', () => {
    const input  = document.getElementById('password');
    const icon   = document.getElementById('pw-icon');
    const isText = input.type === 'text';
    input.type   = isText ? 'password' : 'text';
    icon.className = isText ? 'fa-solid fa-eye' : 'fa-solid fa-eye-slash';
  });

  document.getElementById('password').addEventListener('input', (e) => {
    const pw     = e.target.value;
    const fill   = document.getElementById('strength-fill');
    const label  = document.getElementById('strength-label');
    let score    = 0;
    if (pw.length >= 8)              score++;
    if (/[A-Z]/.test(pw))            score++;
    if (/[0-9]/.test(pw))            score++;
    if (/[^A-Za-z0-9]/.test(pw))     score++;

    const levels = [
      { pct: '0%',   color: 'transparent', text: '' },
      { pct: '25%',  color: 'var(--danger)',  text: 'Muy débil' },
      { pct: '50%',  color: 'var(--warning)', text: 'Débil' },
      { pct: '75%',  color: 'var(--primary)', text: 'Buena' },
      { pct: '100%', color: 'var(--safe)',     text: 'Fuerte' }
    ];

    const lvl = pw.length === 0 ? 0 : Math.max(1, score);
    fill.style.width      = levels[lvl].pct;
    fill.style.background = levels[lvl].color;
    label.textContent     = levels[lvl].text;
  });

  document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const name   = document.getElementById('name').value.trim();
    const email  = document.getElementById('email').value.trim();
    const pw     = document.getElementById('password').value;
    const pw2    = document.getElementById('password2').value;
    const btn    = document.getElementById('btn-register');
    const banner = document.getElementById('error-banner');
    const errTxt = document.getElementById('error-text');

    banner.classList.remove('visible');

    if (pw !== pw2) {
      errTxt.textContent = 'Las contraseñas no coinciden.';
      banner.classList.add('visible');
      return;
    }

    if (pw.length < 8) {
      errTxt.textContent = 'La contraseña debe tener al menos 8 caracteres.';
      banner.classList.add('visible');
      return;
    }

    btn.disabled  = true;
    btn.innerHTML = '<span class="spinner"></span> Creando cuenta…';

    try {
      await registerWithEmail(email, pw, name);
      window.location.href = 'setup-profile.html';
    } catch (err) {
      let msg = 'Ocurrió un error. Inténtalo de nuevo.';
      if (err.code === 'auth/email-already-in-use') {
        msg = 'Ya existe una cuenta con este email.';
      } else if (err.code === 'auth/invalid-email') {
        msg = 'Email no válido.';
      } else if (err.code === 'auth/weak-password') {
        msg = 'La contraseña es demasiado débil.';
      }
      errTxt.textContent = msg;
      banner.classList.add('visible');
      btn.disabled  = false;
      btn.innerHTML = 'Crear cuenta';
    }
  });
</script>
</body>
</html>
