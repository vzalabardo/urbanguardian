<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#121212">
  <title>Urban Guardian — Iniciar sesión</title>
  <link rel="stylesheet" href="../css/app.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .auth-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: var(--space-xl) var(--space-lg);
      padding-bottom: calc(var(--space-xl) + env(safe-area-inset-bottom, 0));
      gap: var(--space-lg);
    }

    .auth-header {
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
      margin-bottom: var(--space-sm);
    }

    .auth-logo {
      width: 48px;
      height: 48px;
      background: var(--primary);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.375rem;
      color: #fff;
      margin-bottom: var(--space-md);
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .auth-footer {
      margin-top: auto;
      text-align: center;
      font-size: 0.9375rem;
      color: var(--text-muted);
    }

    .error-banner {
      background: var(--danger-lt);
      border: 1px solid var(--danger);
      border-radius: var(--radius-md);
      padding: var(--space-md);
      font-size: 0.9rem;
      color: var(--danger);
      display: none;
    }

    .error-banner.visible {
      display: block;
    }
  </style>
</head>
<body>
<div class="mobile-frame">
  <div class="auth-screen">

    <!-- Header -->
    <div class="auth-header">
      <div class="auth-logo">
        <i class="fa-solid fa-shield-halved"></i>
      </div>
      <h2>Bienvenido de nuevo</h2>
      <p class="text-muted">Inicia sesión para continuar</p>
    </div>

    <!-- Error banner -->
    <div class="error-banner" id="error-banner">
      <i class="fa-solid fa-circle-exclamation"></i>
      <span id="error-text"></span>
    </div>

    <!-- Form -->
    <form class="auth-form" id="login-form" novalidate>

      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input
          class="form-input"
          type="email"
          id="email"
          name="email"
          placeholder="tucorreo@ejemplo.com"
          autocomplete="email"
          required
        >
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Contraseña</label>
        <div class="input-wrapper">
          <input
            class="form-input"
            type="password"
            id="password"
            name="password"
            placeholder="Tu contraseña"
            autocomplete="current-password"
            required
          >
          <button type="button" class="input-icon" id="toggle-pw" aria-label="Ver contraseña">
            <i class="fa-solid fa-eye" id="pw-icon"></i>
          </button>
        </div>
      </div>

      <button type="button" class="btn btn-text" style="align-self:flex-end;padding-right:0;" onclick="window.location.href='#'">
        ¿Olvidaste tu contraseña?
      </button>

      <button type="submit" class="btn btn-primary btn-full btn-lg mt-md" id="btn-login">
        Iniciar sesión
      </button>

    </form>

    <div class="divider">o</div>

    <button class="btn btn-ghost btn-full" id="btn-google" disabled style="opacity:0.5;cursor:not-allowed;">
      <i class="fa-brands fa-google"></i>
      Continuar con Google
      <span class="badge badge-primary text-xs" style="margin-left:auto;">Próximamente</span>
    </button>

    <!-- Footer -->
    <div class="auth-footer">
      ¿No tienes cuenta?
      <a href="register.html" style="font-weight:600;">Regístrate</a>
    </div>

  </div>
</div>

<script type="module">
  import { loginWithEmail, watchAuthState } from '../js/auth.js';

  // Redirect if already logged in
  watchAuthState((user) => {
    if (user) window.location.href = '../map.html';
  });

  // Toggle password visibility
  document.getElementById('toggle-pw').addEventListener('click', () => {
    const input  = document.getElementById('password');
    const icon   = document.getElementById('pw-icon');
    const isText = input.type === 'text';
    input.type   = isText ? 'password' : 'text';
    icon.className = isText ? 'fa-solid fa-eye' : 'fa-solid fa-eye-slash';
  });

  // Form submit
  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('btn-login');
    const banner   = document.getElementById('error-banner');
    const errText  = document.getElementById('error-text');

    btn.disabled   = true;
    btn.innerHTML  = '<span class="spinner"></span> Entrando…';
    banner.classList.remove('visible');

    try {
      await loginWithEmail(email, password);
      window.location.href = '../map.html';
    } catch (err) {
      let msg = 'Ocurrió un error. Inténtalo de nuevo.';
      if (err.code === 'auth/invalid-credential' || err.code === 'auth/wrong-password') {
        msg = 'Email o contraseña incorrectos.';
      } else if (err.code === 'auth/user-not-found') {
        msg = 'No existe una cuenta con este email.';
      } else if (err.code === 'auth/too-many-requests') {
        msg = 'Demasiados intentos. Espera unos minutos.';
      }
      errText.textContent = msg;
      banner.classList.add('visible');
      btn.disabled   = false;
      btn.innerHTML  = 'Iniciar sesión';
    }
  });
</script>
</body>
</html>
